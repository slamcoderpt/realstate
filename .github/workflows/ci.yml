name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase local (aplica migrações)
        run: supabase start

      - name: Testes (unit + RLS)
        run: npm test

      # Build usado tanto para a verificação de compilação como para servir a app
      # ao E2E. A anon key é a chave demo pública do Supabase local (a mesma do
      # .env.test), necessária para o cliente de browser autenticar no E2E.
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54421
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0

      - name: Instalar Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      # As chaves demo públicas do Supabase local são passadas explicitamente ao
      # processo Playwright (que as propaga ao `next start` via webServer.env e ao
      # worker do teste), em vez de depender do carregamento do .env.test.
      - name: E2E (Playwright)
        run: npm run e2e
        env:
          SUPABASE_URL: http://127.0.0.1:54421
          SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
          SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
